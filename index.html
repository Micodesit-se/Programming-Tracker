<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programming Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1f2937;
    --text: #e2e8f0;
    --muted: #6b7280;
    --accent: #60a5fa;
    --accent2: #3b82f6;
    --accent3: #1d4ed8;
    --accent4: #1e3a5f;
    --empty: #111827;
    --red: #f87171;
    --yellow: #fbbf24;
    --green: #34d399;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 32px 24px;
  }

  .container { max-width: 860px; margin: 0 auto; }

  header { margin-bottom: 36px; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(96,165,250,0.1);
    border: 1px solid rgba(96,165,250,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent);
    margin-top: 8px;
  }

  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 20px;
    flex: 1;
    min-width: 120px;
  }

  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--accent); margin-top: 4px; font-family: 'Syne', sans-serif; }

  .graph-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .graph-title { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

  .month-labels {
    display: flex;
    padding-left: 28px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .graph-body { display: flex; gap: 4px; }

  .day-labels {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-right: 4px;
    font-size: 10px;
    color: var(--muted);
    padding-top: 2px;
  }

  .day-label { height: 13px; line-height: 13px; }

  .grid { display: flex; gap: 3px; overflow-x: auto; }
  .week-col { display: flex; flex-direction: column; gap: 3px; }

  .day-cell {
    width: 13px; height: 13px;
    border-radius: 2px;
    background: var(--empty);
    border: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: transform 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }

  .day-cell:hover { transform: scale(1.4); border-color: var(--accent); z-index: 10; position: relative; }
  .day-cell.future { opacity: 0.3; cursor: default; }
  .day-cell.future:hover { transform: none; border-color: rgba(255,255,255,0.04); }
  .day-cell[data-level="1"] { background: var(--accent4); }
  .day-cell[data-level="2"] { background: var(--accent3); }
  .day-cell[data-level="3"] { background: var(--accent2); }
  .day-cell[data-level="4"] { background: var(--accent); }

  .legend {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
    justify-content: flex-end;
  }

  .legend-cell { width: 13px; height: 13px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.04); }

  .log-section, .history-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 18px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }

  label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

  input, select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }
  select option { background: var(--bg); }

  .btn {
    background: var(--accent3);
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 11px 24px;
    transition: background 0.2s, transform 0.1s;
    width: 100%;
  }

  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.98); }

  .entry {
    border-left: 2px solid var(--accent3);
    padding: 12px 16px;
    margin-bottom: 10px;
    background: var(--bg);
    border-radius: 0 6px 6px 0;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .entry-date { font-size: 11px; color: var(--accent); font-weight: 600; }
  .entry-topic { font-size: 14px; font-weight: 600; }
  .entry-meta { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
  .entry-notes { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }

  .lang-tag {
    display: inline-block;
    background: rgba(96,165,250,0.15);
    border: 1px solid rgba(96,165,250,0.3);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
    color: var(--accent);
  }

  .type-tag {
    display: inline-block;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.3);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
    color: var(--green);
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }
  .delete-btn:hover { color: var(--red); background: rgba(248,113,113,0.1); }

  .empty-state { color: var(--muted); font-size: 13px; text-align: center; padding: 24px; }

  .tooltip {
    position: fixed;
    background: #1c2128;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    pointer-events: none;
    z-index: 100;
    display: none;
    white-space: nowrap;
  }

  /* Language breakdown */
  .lang-breakdown {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .lang-pill {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--muted);
  }

  .lang-pill span { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>💻 <span>Programming</span> Tracker</h1>
    <div class="subtitle">log sessions · track languages · build consistency</div>
    <div class="streak-badge" id="streakBadge">🔥 0 day streak</div>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Sessions</div>
      <div class="stat-value" id="statSessions">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Hours</div>
      <div class="stat-value" id="statHours">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Week</div>
      <div class="stat-value" id="statWeek">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best Streak</div>
      <div class="stat-value" id="statBest">0</div>
    </div>
  </div>

  <div class="graph-section">
    <div class="graph-title">coding activity — last 12 months</div>
    <div class="month-labels" id="monthLabels"></div>
    <div class="graph-body">
      <div class="day-labels">
        <div class="day-label"></div>
        <div class="day-label">Mon</div>
        <div class="day-label"></div>
        <div class="day-label">Wed</div>
        <div class="day-label"></div>
        <div class="day-label">Fri</div>
        <div class="day-label"></div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
    <div class="legend">
      Less
      <div class="legend-cell" style="background:var(--empty)"></div>
      <div class="legend-cell" style="background:var(--accent4)"></div>
      <div class="legend-cell" style="background:var(--accent3)"></div>
      <div class="legend-cell" style="background:var(--accent2)"></div>
      <div class="legend-cell" style="background:var(--accent)"></div>
      More
    </div>
    <div class="lang-breakdown" id="langBreakdown"></div>
  </div>

  <div class="log-section">
    <div class="section-title">+ Log a session</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="inputDate">
      </div>
      <div class="form-group">
        <label>Time (minutes)</label>
        <input type="number" id="inputTime" placeholder="e.g. 60" min="1">
      </div>
      <div class="form-group">
        <label>Language / Tech</label>
        <select id="inputLang">
          <option value="Python">Python</option>
          <option value="JavaScript">JavaScript</option>
          <option value="TypeScript">TypeScript</option>
          <option value="HTML/CSS">HTML/CSS</option>
          <option value="React">React</option>
          <option value="Java">Java</option>
          <option value="C">C</option>
          <option value="C++">C++</option>
          <option value="C#">C#</option>
          <option value="Rust">Rust</option>
          <option value="Go">Go</option>
          <option value="SQL">SQL</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="inputType">
          <option value="Project">Project</option>
          <option value="Tutorial">Tutorial</option>
          <option value="Exercise">Exercise / Practice</option>
          <option value="Reading">Reading / Docs</option>
          <option value="Course">Course / Video</option>
          <option value="Problem Solving">Problem Solving</option>
          <option value="Bug Fixing">Bug Fixing</option>
        </select>
      </div>
      <div class="form-group full">
        <label>What did you work on?</label>
        <input type="text" id="inputTopic" placeholder="e.g. Built a login form with validation">
      </div>
      <div class="form-group full">
        <label>Notes (optional)</label>
        <textarea id="inputNotes" placeholder="What did you learn? Any blockers? Next steps?"></textarea>
      </div>
    </div>
    <button class="btn" onclick="logSession()">Log Session</button>
  </div>

  <div class="history-section">
    <div class="section-title">Session History</div>
    <div id="historyList"><div class="empty-state">No sessions yet. Log your first one above!</div></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
  let sessions = JSON.parse(localStorage.getItem('prog_sessions') || '[]');
  document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];

  function save() { localStorage.setItem('prog_sessions', JSON.stringify(sessions)); }

  function logSession() {
    const date = document.getElementById('inputDate').value;
    const time = parseInt(document.getElementById('inputTime').value);
    const lang = document.getElementById('inputLang').value;
    const type = document.getElementById('inputType').value;
    const topic = document.getElementById('inputTopic').value.trim();
    const notes = document.getElementById('inputNotes').value.trim();

    if (!date || !time || !topic) { alert('Please fill in date, time, and what you worked on.'); return; }

    sessions.push({ id: Date.now(), date, time, lang, type, topic, notes });
    sessions.sort((a, b) => b.date.localeCompare(a.date));
    save();
    render();

    document.getElementById('inputTime').value = '';
    document.getElementById('inputTopic').value = '';
    document.getElementById('inputNotes').value = '';
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
  }

  function deleteSession(id) {
    sessions = sessions.filter(s => s.id !== id);
    save();
    render();
  }

  function getDateMap() {
    const map = {};
    for (const s of sessions) map[s.date] = (map[s.date] || 0) + s.time;
    return map;
  }

  function getLevel(mins) {
    if (!mins) return 0;
    if (mins < 30) return 1;
    if (mins < 60) return 2;
    if (mins < 120) return 3;
    return 4;
  }

  function calcStreak() {
    const dateMap = getDateMap();
    const today = new Date();
    let streak = 0, best = 0, cur = 0;
    const d = new Date(today);
    while (true) {
      const key = d.toISOString().split('T')[0];
      if (dateMap[key]) { streak++; d.setDate(d.getDate() - 1); } else break;
    }
    const allDates = Object.keys(dateMap).sort();
    let prev = null;
    for (const dt of allDates) {
      if (prev) {
        const diff = (new Date(dt) - new Date(prev)) / 86400000;
        cur = diff === 1 ? cur + 1 : 1;
      } else cur = 1;
      best = Math.max(best, cur);
      prev = dt;
    }
    return { streak, best };
  }

  function renderGraph() {
    const grid = document.getElementById('grid');
    const monthLabels = document.getElementById('monthLabels');
    grid.innerHTML = '';
    monthLabels.innerHTML = '';

    const dateMap = getDateMap();
    const today = new Date();
    const start = new Date(today); start.setFullYear(start.getFullYear() - 1);
    const startDay = new Date(start); startDay.setDate(startDay.getDate() - startDay.getDay());
    const tooltip = document.getElementById('tooltip');
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    let cur = new Date(startDay), weeks = [], lastMonth = -1, monthPositions = [], weekIdx = 0;
    while (cur <= today) {
      const week = [];
      for (let d = 0; d < 7; d++) { week.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }
      weeks.push(week);
      const first = week.find(d => d >= start && d <= today);
      if (first && first.getMonth() !== lastMonth) {
        monthPositions.push({ idx: weekIdx, month: first.getMonth() });
        lastMonth = first.getMonth();
      }
      weekIdx++;
    }

    let labelHtml = '';
    for (let i = 0; i < monthPositions.length; i++) {
      const gap = monthPositions[i].idx - (i === 0 ? 0 : monthPositions[i-1].idx);
      labelHtml += `<span style="min-width:${gap*16}px;display:inline-block">${monthNames[monthPositions[i].month]}</span>`;
    }
    monthLabels.innerHTML = labelHtml;

    for (const week of weeks) {
      const col = document.createElement('div');
      col.className = 'week-col';
      for (const day of week) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        const key = day.toISOString().split('T')[0];
        const mins = dateMap[key] || 0;
        if (day > today) { cell.classList.add('future'); }
        else { cell.dataset.level = getLevel(mins); }

        cell.addEventListener('mouseenter', e => {
          const daySessions = sessions.filter(s => s.date === key);
          const label = day.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
          tooltip.style.display = 'block';
          tooltip.innerHTML = mins
            ? `<strong>${label}</strong><br>${mins} min · ${daySessions.length} session${daySessions.length > 1 ? 's' : ''}<br>${[...new Set(daySessions.map(s => s.lang))].join(', ')}`
            : `<strong>${label}</strong><br>No coding`;
        });
        cell.addEventListener('mousemove', e => {
          tooltip.style.left = (e.clientX + 14) + 'px';
          tooltip.style.top = (e.clientY - 10) + 'px';
        });
        cell.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
        col.appendChild(cell);
      }
      grid.appendChild(col);
    }

    // Language breakdown
    const langMap = {};
    for (const s of sessions) langMap[s.lang] = (langMap[s.lang] || 0) + s.time;
    const sorted = Object.entries(langMap).sort((a, b) => b[1] - a[1]);
    const breakdown = document.getElementById('langBreakdown');
    breakdown.innerHTML = sorted.length
      ? sorted.map(([lang, mins]) => `<div class="lang-pill">${lang} <span>${(mins/60).toFixed(1)}h</span></div>`).join('')
      : '';
  }

  function renderStats() {
    const total = sessions.length;
    const totalMins = sessions.reduce((s, x) => s + x.time, 0);
    const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
    const weekKey = weekAgo.toISOString().split('T')[0];
    const thisWeek = sessions.filter(s => s.date >= weekKey).length;
    const { streak, best } = calcStreak();

    document.getElementById('statSessions').textContent = total;
    document.getElementById('statHours').textContent = (totalMins / 60).toFixed(1);
    document.getElementById('statWeek').textContent = thisWeek;
    document.getElementById('statBest').textContent = best;
    document.getElementById('streakBadge').textContent = `🔥 ${streak} day streak`;
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!sessions.length) {
      list.innerHTML = '<div class="empty-state">No sessions yet. Log your first one above!</div>';
      return;
    }
    list.innerHTML = sessions.slice(0, 30).map(s => `
      <div class="entry">
        <div class="entry-header">
          <span class="entry-date">${s.date}</span>
          <button class="delete-btn" onclick="deleteSession(${s.id})">✕</button>
        </div>
        <div class="entry-topic">${s.topic}</div>
        <div class="entry-meta">
          <span>${s.time} min</span>
          <span class="lang-tag">${s.lang}</span>
          <span class="type-tag">${s.type}</span>
        </div>
        ${s.notes ? `<div class="entry-notes">"${s.notes}"</div>` : ''}
      </div>
    `).join('');
  }

  function render() { renderGraph(); renderStats(); renderHistory(); }
  render();
</script>
</body>
</html>
